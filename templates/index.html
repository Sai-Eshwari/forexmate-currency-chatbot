<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ForexMate</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(255,255,255,0.05);
}

.telegram {
    background: #229ED9;
    padding: 8px 14px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
}

/* Layout */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* History panel */
.history {
    width: 250px;
    background: rgba(255,255,255,0.05);
    padding: 10px;
    overflow-y: auto;
}

.history h3 {
    margin-top: 0;
}

.history-item {
    padding: 8px;
    margin: 5px 0;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    cursor: pointer;
}

/* Chat */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    padding: 10px 15px;
    border-radius: 10px;
    margin: 10px 0;
    max-width: 60%;
}

.user {
    background: #22c55e;
    margin-left: auto;
}

.bot {
    background: #334155;
}

/* Input */
.input-box {
    display: flex;
    padding: 10px;
    background: rgba(255,255,255,0.05);
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>ForexMate</h2>
    <a href="https://t.me/ForexMate_bot" target="_blank" class="telegram">
        💬 Telegram
    </a>
</div>

<div class="container">

    <!-- HISTORY PANEL -->
    <div class="history" id="history">
        <h3>History</h3>
    </div>

    <!-- CHAT -->
    <div class="chat-area">

        <div class="chat" id="chat"></div>

        <div class="input-box">
            <input id="input" placeholder="Type: 1 usd to inr">
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const historyDiv = document.getElementById("history");

let historyList = [];

// Send message
async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");

    input.value = "";

    // Add to history
    historyList.push(text);
    renderHistory();

    try {
        const response = await fetch("/webhook", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ query: text })
        });

        const data = await response.json();

        addMessage(data.fulfillmentText, "bot");

    } catch (e) {
        addMessage("⚠️ Server error", "bot");
    }
}

// Add message to UI
function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    chat.appendChild(msg);

    chat.scrollTop = chat.scrollHeight;
}

// Render history
function renderHistory() {
    historyDiv.innerHTML = "<h3>History</h3>";

    historyList.slice().reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerText = item;

        div.onclick = () => {
            input.value = item;
        };

        historyDiv.appendChild(div);
    });
}

// Enter key support
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
